<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Queue System</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
        }
        .glass-card {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 107, 0, 0.3);
            border-radius: 20px;
        }
        .input-style {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 107, 0, 0.2);
            border-radius: 10px;
            padding: 12px;
            width: 100%;
            color: white;
            outline: none;
        }
        .input-style:focus { border-color: #ff6b00; }
        .token-circle {
            width: 150px;
            height: 150px;
            border: 5px solid #ff6b00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 900;
            color: #ff6b00;
            margin: 20px auto;
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-card p-8 w-full max-w-md shadow-2xl">
        <!-- REGISTRATION FORM -->
        <div id="regForm">
            <h2 class="text-3xl font-bold text-orange-500 mb-2 text-center uppercase tracking-tight">Join Queue</h2>
            <p class="text-gray-500 text-sm text-center mb-8 italic">कृपया तुमची माहिती भरा</p>

            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-orange-500 uppercase ml-1">तुमचे नाव</label>
                    <input type="text" id="name" placeholder="उदा. राहुल पाटील" class="input-style mt-1">
                </div>

                <div>
                    <label class="text-xs font-bold text-orange-500 uppercase ml-1">कामाचे स्वरूप</label>
                    <select id="purpose" class="input-style mt-1">
                        <option value="चौकशी">चौकशी (Enquiry)</option>
                        <option value="फी भरणे">फी भरणे (Fees)</option>
                        <option value="दस्तऐवज">दस्तऐवज (Documents)</option>
                        <option value="इतर">इतर (Other)</option>
                    </select>
                </div>

                <button onclick="register()" id="regBtn" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-4 rounded-xl transition-all transform active:scale-95 shadow-lg uppercase mt-4">
                    Get Token →
                </button>
            </div>
        </div>

        <!-- STATUS VIEW (Initially Hidden) -->
        <div id="statusView" class="hidden text-center animate-in fade-in duration-500">
            <h2 class="text-xl font-bold text-orange-500 mb-4 uppercase">तुमचा टोकन नंबर</h2>
            <div id="myToken" class="token-circle">--</div>
            
            <div class="space-y-4 mt-6">
                <div class="bg-black/30 p-4 rounded-xl border border-white/5">
                    <p class="text-gray-400 text-xs uppercase font-bold mb-1">वेटिंग स्टेटस</p>
                    <p id="positionText" class="text-xl font-bold text-green-400">Loading...</p>
                </div>

                <div class="flex justify-between gap-4">
                    <div class="bg-black/30 p-3 rounded-xl flex-1 border border-white/5">
                        <p class="text-gray-500 text-[10px] uppercase font-bold">आताचा नंबर</p>
                        <p id="nowServing" class="text-lg font-bold text-orange-500">--</p>
                    </div>
                    <div class="bg-black/30 p-3 rounded-xl flex-1 border border-white/5">
                        <p class="text-gray-500 text-[10px] uppercase font-bold">अंदाजित वेळ</p>
                        <p id="estWait" class="text-lg font-bold text-orange-500">-- min</p>
                    </div>
                </div>
            </div>
            
            <p class="text-gray-500 text-[10px] mt-8 uppercase font-bold">● कृपया तुमची वेळ येईपर्यंत थांबून रहा</p>
        </div>
    </div>

    <script>
        // ╔═══════════════════════════════════════════════════════╗
        // ║       FIREBASE CONFIGURATION (Same as Admin)          ║
        // ╚═══════════════════════════════════════════════════════╝
        const firebaseConfig = {
            apiKey: "AIzaSyCFNZB5SBj2QoBJ6qF_pTkfAC3rVymEahM",
            authDomain: "queuesystem-80e06.firebaseapp.com",
            projectId: "queuesystem-80e06",
            storageBucket: "queuesystem-80e06.firebasestorage.app",
            messagingSenderId: "30275507505",
            appId: "1:30275507505:web:d00cc742ed42bb6f370c10",
            measurementId: "G-54G6CL3L5Y"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let myTokenNumber = null;
        let isRegistered = false;

        // नोंदणी फंक्शन
        async function register() {
            const name = document.getElementById('name').value.trim();
            const purpose = document.getElementById('purpose').value;
            const btn = document.getElementById('regBtn');

            if (!name) {
                alert("कृपया तुमचे नाव टाका!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "कृपया थांबा...";

            try {
                // १. टोकन नंबर ठरवणे (Last token + 1)
                const snapshot = await db.collection('logs').where('action', '==', 'JOINED').get();
                const token = 100 + snapshot.size + 1;

                // २. क्यु मध्ये ॲड करणे
                await db.collection('queue').add({
                    token: token,
                    name: name,
                    purpose: purpose,
                    joinTime: new Date().toLocaleTimeString(),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                // ३. लॉग मध्ये ॲड करणे (ॲडमिन पॅनेलसाठी)
                await db.collection('logs').add({
                    time: new Date().toLocaleTimeString(),
                    action: 'JOINED',
                    detail: `${token} - ${name} (${purpose})`,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                myTokenNumber = token;
                isRegistered = true;
                
                document.getElementById('regForm').classList.add('hidden');
                document.getElementById('statusView').classList.remove('hidden');
                document.getElementById('myToken').innerText = token;

                startLiveTracking();

            } catch (error) {
                console.error("Error:", error);
                alert("नोंदणी अयशस्वी! कृपया पुन्हा प्रयत्न करा.");
                btn.disabled = false;
                btn.innerText = "Get Token →";
            }
        }

        // रिअल-टाईम ट्रॅकिंग
        function startLiveTracking() {
            // १. क्यु मधील आपली पोझिशन बघणे
            db.collection('queue').orderBy('timestamp', 'asc').onSnapshot(snapshot => {
                let queue = [];
                snapshot.forEach(doc => queue.push(doc.data().token));
                
                const pos = queue.indexOf(myTokenNumber) + 1;
                
                if (pos > 0) {
                    document.getElementById('positionText').innerText = `तुम्ही ${pos} नंबरला आहात`;
                    document.getElementById('estWait').innerText = pos * 5;
                } else {
                    // जर क्यु मध्ये नसेल तर कदाचित नंबर आला असेल (Admin ने Call Next केले असेल)
                    checkIfServing();
                }
            });

            // २. सध्या कोणता नंबर चालू आहे ते बघणे
            db.collection('meta').doc('currentServing').onSnapshot(doc => {
                const now = doc.exists ? doc.data().token : "—";
                document.getElementById('nowServing').innerText = now;
                
                if (now == myTokenNumber) {
                    document.getElementById('positionText').innerText = "तुमचा नंबर आला आहे! 🏃";
                    document.getElementById('positionText').className = "text-xl font-bold text-orange-500 animate-bounce";
                }
            });
        }

        async function checkIfServing() {
            const doc = await db.collection('meta').doc('currentServing').get();
            if(doc.exists && doc.data().token == myTokenNumber) {
                document.getElementById('positionText').innerText = "तुमचा नंबर आला आहे! 🏃";
            } else if (!myTokenNumber) {
                // Not called yet
            } else {
                 document.getElementById('positionText').innerText = "सेवा पूर्ण झाली ✅";
            }
        }
    </script>
</body>
</html>

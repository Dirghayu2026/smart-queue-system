<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Queue Management</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #FF6B00; padding-bottom: 10px; }
        h1 { color: #FF6B00; }
        table { width: 100%; border-collapse: collapse; background: #1E1E1E; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background-color: #2A2A2A; color: #FF6B00; }
        .btn-call { background-color: #FF6B00; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-call:hover { background-color: #e65a00; }
        .status-tag { font-size: 12px; padding: 4px 8px; border-radius: 4px; background: #333; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Admin Control Panel</h1>
        <p>Live Student Queue Management System</p>
    </header>

    <table id="queueTable">
        <thead>
            <tr>
                <th>Token</th>
                <th>Student Name</th>
                <th>Purpose</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Data will be loaded here dynamically -->
        </tbody>
    </table>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>

<script>
    // 1. Firebase Configuration (Tujhya Firebase Console madhun copy kara)
    const firebaseConfig = {
        apiKey: "AIzaSyCFNZB5SBj2QoBJ6qF_pTkfAC3rVymEahM",
        authDomain: "queuesystem-80e06.firebaseapp.com",
        projectId: "queuesystem-80e06",
        storageBucket: "queuesystem-80e06.firebasestorage.app",
        messagingSenderId: "30275507505",
        appId: "1:30275507505:web:d00cc742ed42bb6f370c10"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. Fetch Data from Firestore and Display in Table
    function loadQueue() {
        db.collection("queue").orderBy("timestamp", "asc").onSnapshot((snapshot) => {
            const tableBody = document.getElementById("tableBody");
            tableBody.innerHTML = ""; // Clear existing data

            snapshot.forEach((doc) => {
                const data = doc.data();
                const row = `
                    <tr>
                        <td><strong>${data.token || 'N/A'}</strong></td>
                        <td>${data.name}</td>
                        <td>${data.purpose}</td>
                        <td><span class="status-tag">Waiting</span></td>
                        <td>
                            <button class="btn-call" onclick="callStudent('${data.fcmToken}', '${data.name}')">
                                Call Next
                            </button>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        });
    }

    // 3. Logic to Send Notification via Node.js Backend
    async function callStudent(fcmToken, studentName) {
        if (!fcmToken || fcmToken === "undefined") {
            alert("This student has not enabled notifications.");
            return;
        }

        try {
            // Backend URL (Node.js server running on port 5000)
            const response = await fetch('http://localhost:5000/notify-student', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    fcmToken: fcmToken,
                    studentName: studentName
                })
            });

            const result = await response.json();
            if (result.success) {
                alert("Notification sent to " + studentName);
            } else {
                alert("Error: " + result.error);
            }
        } catch (error) {
            console.error("Connection Error:", error);
            alert("Make sure your Node.js server (server.js) is running on port 5000.");
        }
    }

    // Start loading data on page load
    loadQueue();
</script>

</body>
</html>

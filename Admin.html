<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Command Center | Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #08090a; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-panel { background: rgba(17, 18, 20, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .stat-card { transition: transform 0.2s; border-left: 4px solid transparent; }
        .stat-card:hover { transform: translateY(-5px); border-left-color: #f97316; }
        .serving-glow { text-shadow: 0 0 20px rgba(249, 115, 22, 0.4); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <!-- 🌐 SIDEBAR NAVIGATION (DUMMY FOR UI) -->
    <div class="fixed left-0 top-0 h-full w-20 flex flex-col items-center py-8 glass-panel border-r">
        <div class="w-12 h-12 bg-orange-500 rounded-2xl flex items-center justify-center mb-10 shadow-lg shadow-orange-500/20">
            <i class="fas fa-bolt text-black text-xl"></i>
        </div>
        <div class="flex flex-col gap-8 text-zinc-500">
            <i class="fas fa-th-large text-orange-500"></i>
            <i class="fas fa-users"></i>
            <i class="fas fa-chart-pie"></i>
            <i class="fas fa-cog"></i>
        </div>
    </div>

    <!-- 📊 MAIN CONTENT -->
    <main class="ml-24 p-8">
        
        <!-- HEADER -->
        <header class="flex justify-between items-end mb-10">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight">Queue <span class="text-orange-500">Dashboard</span></h1>
                <p class="text-zinc-500 text-sm font-medium">Monitoring DBATU Student Services</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right mr-4">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase">System Status</p>
                    <p class="text-xs text-green-500 font-bold flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> OPERATIONAL
                    </p>
                </div>
                <button onclick="location.reload()" class="w-10 h-10 rounded-xl glass-panel flex items-center justify-center hover:bg-zinc-800 transition-all">
                    <i class="fas fa-sync-alt text-xs"></i>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-6">
            
            <!-- TOP STATS -->
            <div class="col-span-12 lg:col-span-8 grid grid-cols-3 gap-6">
                <div class="stat-card glass-panel p-6 rounded-3xl">
                    <p class="text-zinc-500 text-xs font-bold uppercase mb-2">Total Tokens</p>
                    <h2 id="totalTokens" class="text-4xl font-extrabold">0</h2>
                </div>
                <div class="stat-card glass-panel p-6 rounded-3xl">
                    <p class="text-zinc-500 text-xs font-bold uppercase mb-2">In Waiting</p>
                    <h2 id="waitingCount" class="text-4xl font-extrabold text-orange-500">0</h2>
                </div>
                <div class="stat-card glass-panel p-6 rounded-3xl">
                    <p class="text-zinc-500 text-xs font-bold uppercase mb-2">Completed</p>
                    <h2 id="completedCount" class="text-4xl font-extrabold text-green-500">0</h2>
                </div>

                <!-- 📢 BROADCAST SECTION -->
                <div class="col-span-3 glass-panel p-6 rounded-3xl mt-2">
                    <h3 class="text-sm font-bold mb-4 flex items-center gap-2">
                        <i class="fas fa-bullhorn text-orange-500"></i> Broadcast Announcement
                    </h3>
                    <div class="flex gap-4">
                        <input type="text" id="noticeInput" placeholder="Enter message for student screens..." 
                            class="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:border-orange-500 outline-none">
                        <button onclick="sendNotice()" class="px-8 bg-orange-600 hover:bg-orange-500 text-black font-bold rounded-xl transition-all">PUBLISH</button>
                    </div>
                </div>
            </div>

            <!-- SERVING PANEL -->
            <div class="col-span-12 lg:col-span-4">
                <div class="glass-panel p-8 rounded-[2.5rem] border-2 border-orange-500/20 flex flex-col items-center justify-center h-full relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-orange-500/5 blur-3xl rounded-full"></div>
                    <p class="text-zinc-500 text-[10px] font-black uppercase tracking-widest mb-4">Now Serving</p>
                    <div id="servingNumber" class="text-9xl font-black text-white serving-glow mb-8 tracking-tighter">--</div>
                    <button onclick="callNext()" class="w-full py-5 bg-orange-600 hover:bg-orange-500 text-white font-black rounded-2xl shadow-xl shadow-orange-900/20 transform active:scale-95 transition-all">
                        NEXT TOKEN <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>

            <!-- DATA TABLE: WAITING LIST -->
            <div class="col-span-12 glass-panel rounded-3xl overflow-hidden">
                <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
                    <h3 class="font-bold">Live Waiting List</h3>
                    <button onclick="clearQueue()" class="text-red-500 text-xs font-bold hover:underline">RESET QUEUE</button>
                </div>
                <div class="overflow-x-auto h-[400px] custom-scroll">
                    <table class="w-full text-left border-collapse">
                        <thead class="text-zinc-500 text-[10px] uppercase font-black bg-black/20">
                            <tr>
                                <th class="px-8 py-4">Token</th>
                                <th class="px-8 py-4">Student Name</th>
                                <th class="px-8 py-4">Purpose</th>
                                <th class="px-8 py-4 text-right">Status</th>
                            </tr>
                        </thead>
                        <tbody id="queueTable" class="text-sm">
                            <!-- Rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCFNZB5SBj2QoBJ6qF_pTkfAC3rVymEahM",
            authDomain: "queuesystem-80e06.firebaseapp.com",
            projectId: "queuesystem-80e06",
            storageBucket: "queuesystem-80e06.firebasestorage.app",
            messagingSenderId: "30275507505",
            appId: "1:30275507505:web:d00cc742ed42bb6f370c10"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let queue = [];
        let completed = 0;

        // REAL-TIME UPDATES
        db.collection('queue').orderBy('timestamp', 'asc').onSnapshot(snap => {
            queue = [];
            let html = "";
            snap.forEach(doc => {
                const data = doc.data();
                queue.push({id: doc.id, ...data});
                html += `
                    <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                        <td class="px-8 py-4 font-black text-orange-500 text-lg">#${data.token}</td>
                        <td class="px-8 py-4 font-bold text-zinc-200">${data.name}</td>
                        <td class="px-8 py-4 text-zinc-500 text-xs">${data.purpose}</td>
                        <td class="px-8 py-4 text-right"><span class="px-3 py-1 bg-orange-500/10 text-orange-500 rounded-full text-[10px] font-black">WAITING</span></td>
                    </tr>`;
            });
            document.getElementById('queueTable').innerHTML = html || "<tr><td colspan='4' class='p-10 text-center text-zinc-600'>No students in queue</td></tr>";
            document.getElementById('waitingCount').innerText = queue.length;
            document.getElementById('totalTokens').innerText = 100 + queue.length + completed;
        });

        db.collection('meta').doc('currentServing').onSnapshot(doc => {
            document.getElementById('servingNumber').innerText = doc.exists ? doc.data().token : "--";
        });

        // ACTIONS
        async function callNext() {
            if (queue.length === 0) return alert("Queue is empty!");
            const next = queue[0];
            await db.collection('queue').doc(next.id).delete();
            await db.collection('meta').doc('currentServing').set({ token: next.token });
            completed++;
            document.getElementById('completedCount').innerText = completed;
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(`Next Token ${next.token}, ${next.name}`));
        }

        async function sendNotice() {
            const msg = document.getElementById('noticeInput').value;
            if(!msg) return;
            await db.collection('meta').doc('announcement').set({ message: msg });
            document.getElementById('noticeInput').value = "";
            alert("Broadcast sent!");
        }

        async function clearQueue() {
            if(!confirm("Reset entire system?")) return;
            const snap = await db.collection('queue').get();
            snap.forEach(d => d.ref.delete());
            await db.collection('meta').doc('currentServing').delete();
            completed = 0;
            document.getElementById('completedCount').innerText = 0;
        }
    </script>
</body>
</html>

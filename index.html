<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Queue - Student Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            background: #000000; color: #ffffff; font-family: 'Inter', sans-serif; 
            display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px 0;
        }
        .notice-banner {
            background: rgba(255, 107, 0, 0.1); border: 1px solid #ff6b00; border-radius: 12px;
            padding: 15px; width: 90%; max-width: 450px; position: fixed; top: 20px;
            display: flex; align-items: center; gap: 12px; z-index: 50;
        }
        .premium-card { 
            background: #111111; border: 1px solid #333333; border-radius: 28px; 
            padding: 40px; width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); margin-top: 80px;
        }
        .input-group { position: relative; margin-bottom: 25px; text-align: left; }
        .input-group label {
            font-size: 10px; font-weight: 800; color: #ff6b00; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 8px; display: block;
        }
        .input-field {
            width: 100%; background: #1a1a1a; border: 1px solid #333333; border-radius: 12px;
            padding: 15px; color: white; outline: none; transition: 0.3s;
        }
        .btn-primary {
            width: 100%; background: #ff6b00; color: white; font-weight: 800; padding: 18px;
            border-radius: 15px; text-transform: uppercase; display: flex; align-items: center;
            justify-content: center; gap: 10px; cursor: pointer; border: none;
        }
        .token-circle {
            width: 150px; height: 150px; border: 4px solid #ff6b00; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 48px;
            font-weight: 900; color: #ff6b00; margin: 20px auto;
        }
    </style>
</head>
<body>

    <div class="notice-banner">
        <i class="fas fa-bullhorn text-orange-500"></i>
        <p id="bannerNoticeText" class="text-[11px] font-bold text-orange-500 uppercase italic leading-tight">
            STUDENT HAVE TO COME TO COUNTER WHEN WE CALL THE TOKEN NUMBER WITH NAME
        </p>
    </div>

    <div class="premium-card">
        
        <div id="regForm">
            <i class="fas fa-university text-orange-500 text-3xl mb-4"></i>
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">Smart <span class="text-orange-500">Queue</span></h1>
            <p class="text-zinc-500 text-[11px] font-bold mb-8">Digital Student Portal</p>

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter Name" class="input-field">
            </div>

            <div class="input-group">
                <label>Mobile Number</label>
                <input type="tel" id="phone" placeholder="91XXXXXXXX" class="input-field">
            </div>

            <div class="input-group">
                <label>Purpose</label>
                <div class="relative">
                    <select id="purpose" class="input-field appearance-none bg-[#1a1a1a] pr-10 cursor-pointer">
                        <option value="Admission Enquiry">🏢 Admission Enquiry</option>
                        <option value="Fees Payment">💰 Fees Payment</option>
                        <option value="Document Verification">📄 Document Verification</option>
                        <option value="Exam Section">✍️ Exam Section / Result</option>
                        <option value="Scholarship">🪙 Scholarship Work</option>
                        <option value="Library">📚 Library Support</option>
                        <option value="TC / Bonafide">🎖️ TC / Bonafide Certificate</option>
                        <option value="Other Office Work">⚙️ Other Office Work</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-orange-500">
                        <i class="fas fa-chevron-down text-sm"></i>
                    </div>
                </div>
            </div>

            <button onclick="register()" class="btn-primary">
                GET DIGITAL TOKEN <i class="fas fa-chevron-right text-xs"></i>
            </button>
        </div>

        <div id="closedView" class="hidden text-center py-6">
            <div class="w-20 h-20 bg-red-500/10 text-red-500 border border-red-500/30 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-history text-3xl animate-pulse"></i>
            </div>
            <h2 class="text-2xl font-black uppercase text-red-500 tracking-tight mb-2">You Are Late!</h2>
            <p class="text-zinc-400 text-sm font-semibold px-4 mb-6">Counter is closed for the day. Please come back tomorrow.</p>
            <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl text-xs text-zinc-500 font-bold uppercase tracking-wider">
                ⏰ Office Hours: 10:00 AM - 05:00 PM
            </div>
        </div>

        <div id="statusView" class="hidden">
            <h2 class="text-zinc-500 text-[11px] font-bold uppercase tracking-widest mb-4">Your Token</h2>
            <div id="myToken" class="token-circle">--</div>
            <div id="positionCard" class="bg-orange-500/10 border border-orange-500/30 p-5 rounded-2xl mb-6">
                <p id="positionText" class="text-xl font-bold text-white">Wait for call...</p>
            </div>
            <div class="flex gap-4">
                <div class="flex-1 bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase">Now Serving</p>
                    <p id="nowServing" class="text-xl font-bold text-orange-500">—</p>
                </div>
                <div class="flex-1 bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase">Est. Wait</p>
                    <p id="estWait" class="text-xl font-bold text-orange-500">0 min</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCFNZB5SBj2QoBJ6qF_pTkfAC3rVymEahM", 
            authDomain: "queuesystem-80e06.firebaseapp.com", 
            projectId: "queuesystem-80e06", 
            storageBucket: "queuesystem-80e06.firebasestorage.app", 
            messagingSenderId: "30275507505", 
            appId: "1:30275507505:web:d00cc742ed42bb6f370c10" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let myTokenNumber = null;
        let hasAnnounced = false;

        // रिअल-टाइम नोटीस बोर्ड
        db.collection('meta').doc('announcement').onSnapshot(doc => {
            if (doc.exists && doc.data().message) {
                document.getElementById('bannerNoticeText').innerText = doc.data().message;
            }
        });

        async function register() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            if (!name || !phone) return alert("Please fill all details!");

            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));

            try {
                // ॲडमिन पॅनेलचा काउंटर क्लोज्ड स्टेटस चेक करा
                const statusDoc = await db.collection('meta').doc('adminStatus').get();
                if (statusDoc.exists && statusDoc.data().status === 'COUNTER CLOSED') {
                    document.getElementById('regForm').style.display = 'none';
                    document.getElementById('closedView').classList.remove('hidden');
                    return;
                }

                // डायरेक्ट टोकन जनरेशन लॉजिक
                const snap = await db.collection('queue').get();
                const token = 101 + snap.size;

                await db.collection('queue').add({
                    token: token, name: name, phone: phone, purpose: document.getElementById('purpose').value,
                    status: 'waiting', timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                myTokenNumber = token;
                
                // 🌟 परफेक्ट स्क्रीन टॉगल (खिचडी होणार नाही)
                document.getElementById('regForm').style.display = 'none';
                document.getElementById('closedView').style.display = 'none';
                document.getElementById('statusView').classList.remove('hidden');
                document.getElementById('myToken').innerText = token;
                
                startTracking();
            } catch (e) { 
                alert("Database Sync Timeout! Check Firebase Rules."); 
            }
        }

        function startTracking() {
            db.collection('queue').where('status', '==', 'waiting').orderBy('timestamp', 'asc').onSnapshot(snap => {
                let list = []; snap.forEach(doc => list.push(doc.data().token));
                const pos = list.indexOf(myTokenNumber) + 1;
                if (pos > 0) {
                    document.getElementById('positionText').innerText = `You are #${pos} in line`;
                    document.getElementById('estWait').innerText = `${pos * 5} min`;
                }
            });

            db.collection('meta').doc('currentServing').onSnapshot(doc => {
                const serving = doc.exists ? doc.data().token : null;
                document.getElementById('nowServing').innerText = serving || "—";
                
                if (serving && serving == myTokenNumber) {
                    document.getElementById('positionText').innerText = "IT'S YOUR TURN! GO NOW";
                    document.getElementById('positionCard').className = "bg-green-500/20 border border-green-500/50 p-5 rounded-2xl mb-6 animate-pulse";
                    if (!hasAnnounced) {
                        window.speechSynthesis.cancel();
                        const msg = new SpeechSynthesisUtterance(`Attention please! Token number ${myTokenNumber}, please proceed to the counter immediately.`);
                        msg.lang = 'en-US';
                        window.speechSynthesis.speak(msg);
                        hasAnnounced = true;
                    }
                } else { hasAnnounced = false; }
            });
        }
    </script>
</body>
</html>

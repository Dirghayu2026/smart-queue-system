<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Queue - Student Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            background: #000000; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-y: auto;
        }

        /* 📢 Top Banner Style */
        .notice-banner {
            background: rgba(255, 107, 0, 0.1);
            border: 1px solid #ff6b00;
            border-radius: 12px;
            padding: 15px;
            width: 90%;
            max-width: 450px;
            position: fixed;
            top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 50;
        }

        .premium-card { 
            background: #111111; 
            border: 1px solid #333333; 
            border-radius: 28px; 
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            margin-top: 80px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            font-size: 10px;
            font-weight: 800;
            color: #ff6b00;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .input-field {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 12px;
            padding: 15px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .input-field:focus {
            border-color: #ff6b00;
            background: #222222;
        }

        .btn-primary {
            width: 100%;
            background: #ff6b00;
            color: white;
            font-weight: 800;
            padding: 18px;
            border-radius: 15px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }

        .btn-primary:hover {
            background: #e65a00;
            transform: translateY(-2px);
        }

        /* 🎫 Token Display Area */
        .token-circle {
            width: 150px;
            height: 150px;
            border: 4px solid #ff6b00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 900;
            color: #ff6b00;
            margin: 20px auto;
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.2);
        }
    </style>
</head>
<body>

    <!-- Banner -->
    <div class="notice-banner">
        <i class="fas fa-bullhorn text-orange-500"></i>
        <p class="text-[11px] font-bold text-orange-500 uppercase italic leading-tight">
            STUDENT HAVE TO COME TO COUNTER WHEN WE CALL THE TOKEN NUMBER WITH NAME
        </p>
    </div>

    <!-- Main Card -->
    <div class="premium-card">
        <div id="regForm">
            <i class="fas fa-university text-orange-500 text-3xl mb-4"></i>
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">Smart <span class="text-orange-500">Queue</span></h1>
            <p class="text-zinc-500 text-[11px] font-bold mb-8">Digital Student Portal</p>

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter Name" class="input-field">
            </div>

            <div class="input-group">
                <label>Mobile Number</label>
                <input type="tel" id="phone" placeholder="91XXXXXXXX" class="input-field">
            </div>

            <div class="input-group">
                <label>Purpose</label>
                <select id="purpose" class="input-field appearance-none bg-[#1a1a1a]">
                    <option value="Admission">Admission Enquiry</option>
                    <option value="Fees">Fees Payment</option>
                    <option value="Scholarship">Scholarship</option>
                    <option value="Other">Other Office Work</option>
                </select>
            </div>

            <button onclick="register()" class="btn-primary">
                GET DIGITAL TOKEN <i class="fas fa-chevron-right text-xs"></i>
            </button>
        </div>

        <!-- Token View -->
        <div id="statusView" class="hidden">
            <h2 class="text-zinc-500 text-[11px] font-bold uppercase tracking-widest mb-4">Your Token</h2>
            <div id="myToken" class="token-circle">--</div>
            <div id="positionCard" class="bg-orange-500/10 border border-orange-500/30 p-5 rounded-2xl mb-6">
                <p id="positionText" class="text-xl font-bold text-white">Wait for call...</p>
            </div>
            <div class="flex gap-4">
                <div class="flex-1 bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase">Now Serving</p>
                    <p id="nowServing" class="text-xl font-bold text-orange-500">—</p>
                </div>
                <div class="flex-1 bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase">Est. Wait</p>
                    <p id="estWait" class="text-xl font-bold text-orange-500">0 min</p>
                </div>
            </div>
        </div>
    </div>

    <script>
    // ... आधीचा Firebase Config ...
    const db = firebase.firestore();
    let myTokenNumber = null;
    let hasAnnounced = false;

    // 🔊 १. ऑडिओ पूर्णपणे फोर्स-अनलॉक करा
    async function register() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        if (!name || !phone) return alert("Please enter details!");

        // ⚡ ट्रिक: युजरने बटण दाबल्या क्षणी एक रिकामं स्पीच रन करा
        // यामुळे ब्राउझरचं 'Autoplay Block' कायमचं निघून जातं
        const unlock = new SpeechSynthesisUtterance("Welcome");
        unlock.volume = 0; // युजरला काही ऐकू जाणार नाही, पण ब्राउझर अनलॉक होईल
        window.speechSynthesis.speak(unlock);

        const logs = await db.collection('logs').where('action', '==', 'JOINED').get();
        const token = 101 + logs.size;

        await db.collection('queue').add({
            token: token, name: name, phone: phone, status: 'waiting', 
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        myTokenNumber = token;
        document.getElementById('regForm').classList.add('hidden');
        document.getElementById('statusView').classList.remove('hidden');
        document.getElementById('myToken').innerText = token;
        startTracking();
    }

    function startTracking() {
        // २. क्यु पोझिशन अपडेट (आधीसारखंच)
        db.collection('queue').where('status', '==', 'waiting').orderBy('timestamp', 'asc').onSnapshot(snap => {
            let list = []; snap.forEach(doc => list.push(doc.data().token));
            const pos = list.indexOf(myTokenNumber) + 1;
            if (pos > 0) {
                document.getElementById('positionText').innerText = `You are #${pos} in line`;
            }
        });

        // ३. 🎯 तातडीचा व्हॉईस अलर्ट
        db.collection('meta').doc('currentServing').onSnapshot((doc) => {
            if (!doc.exists) return;
            const serving = doc.data().token;
            document.getElementById('nowServing').innerText = serving || "—";
            
            if (serving == myTokenNumber) {
                document.getElementById('positionText').innerText = "IT'S YOUR TURN! GO NOW";
                
                if (!hasAnnounced) {
                    // आवाज येण्यासाठी स्पीच सिंथेसिस इंजिन रिफ्रेश करा
                    window.speechSynthesis.cancel(); 
                    
                    const msg = new SpeechSynthesisUtterance(`Attention please! Token number ${myTokenNumber}, it is your turn. Please proceed to the counter.`);
                    msg.lang = 'en-US';
                    msg.rate = 0.9; // थोडा हळू आवाज जेणेकरून स्पष्ट ऐकू येईल
                    msg.volume = 1.0; // फुल वॉल्यूम
                    
                    window.speechSynthesis.speak(msg);
                    hasAnnounced = true;
                }
            } else {
                hasAnnounced = false;
            }
        });
    }
</script>
</body>
</html>

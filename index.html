<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Queue - Student Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            background: #000000; color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding-bottom: 50px;
        }
        .notice-banner {
            background: rgba(255, 107, 0, 0.1); border: 1px solid #ff6b00; border-radius: 12px;
            padding: 15px; width: 90%; max-width: 450px; position: sticky; top: 20px;
            display: flex; align-items: center; gap: 12px; z-index: 50; backdrop-filter: blur(10px);
        }
        .premium-card { 
            background: #111111; border: 1px solid #333333; border-radius: 32px; 
            padding: 40px; width: 100%; max-width: 420px; text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8); margin-top: 40px; transition: 0.5s;
        }
        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-group label {
            font-size: 11px; font-weight: 700; color: #ff6b00; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 8px; display: block;
        }
        .input-field {
            width: 100%; background: #1a1a1a; border: 1px solid #333333; border-radius: 16px;
            padding: 14px; color: white; outline: none; transition: 0.3s; font-size: 14px;
        }
        .input-field:focus { border-color: #ff6b00; background: #222222; }
        .btn-primary {
            width: 100%; background: #ff6b00; color: black; font-weight: 800; padding: 18px;
            border-radius: 18px; text-transform: uppercase; display: flex; align-items: center;
            justify-content: center; gap: 10px; transition: 0.3s; cursor: pointer; border: none;
        }
        .token-circle {
            width: 160px; height: 160px; border: 6px solid #ff6b00; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 60px;
            font-weight: 900; color: #ff6b00; margin: 20px auto; box-shadow: 0 0 30px rgba(255, 107, 0, 0.3);
        }
        .scroll-down { margin-top: 30px; animation: bounce 2s infinite; color: #444; font-size: 24px; cursor: pointer; }
        @keyframes bounce { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-10px);} }
        
        /* 🔥 FIXED Closed Badge Style */
        .closed-badge {
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            padding: 6px 12px; 
            background: rgba(239, 68, 68, 0.1); 
            border: 1px solid rgba(239, 68, 68, 0.3); 
            border-radius: 100px; 
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="notice-banner">
        <i class="fas fa-bullhorn text-orange-500"></i>
        <p class="text-[11px] font-bold text-orange-500 uppercase italic leading-tight">
            Connecting to Digital Queue...
        </p>
    </div>

    <div class="premium-card">
        <div id="regForm">
            <div id="closedBadge" class="hidden">
                <div class="closed-badge">
                    <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse mr-2"></span>
                    <span class="text-[9px] font-black text-red-500 uppercase tracking-widest">Office Hours Ended</span>
                </div>
            </div>

            <h1 class="text-3xl font-black italic uppercase tracking-tighter">Student <span class="text-orange-500">Portal</span></h1>
            <p class="text-zinc-500 text-[11px] font-bold mb-8 uppercase tracking-widest">DBATU - Queue Management</p>

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter Name" class="input-field">
            </div>
            <div class="input-group">
                <label>Mobile Number</label>
                <input type="tel" id="phone" placeholder="91XXXXXXXX" class="input-field">
            </div>
            <div class="input-group">
                <label>Purpose</label>
                <select id="purpose" class="input-field appearance-none bg-[#1a1a1a]">
                    <option value="Admission Section">Admission Enquiry</option>
                    <option value="Fees Section">Fees Payment</option>
                    <option value="Scholarship">Scholarship (MAHADBT)</option>
                    <option value="Exam Section">Exam Form / Result</option>
                </select>
            </div>
            <button id="mainBtn" onclick="register()" class="btn-primary">
                GET DIGITAL TOKEN <i class="fas fa-ticket-alt"></i>
            </button>
        </div>

        <div id="statusView" class="hidden">
            <div id="myToken" class="token-circle">--</div>
            <div id="positionCard" class="bg-orange-500/10 border border-orange-500/30 p-5 rounded-2xl mb-6">
                <p id="positionText" class="text-xl font-bold text-white">Syncing...</p>
            </div>
        </div>
    </div>

    <div class="scroll-down" onclick="window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'})">
        <i class="fas fa-chevron-down"></i>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCFNZB5SBj2QoBJ6qF_pTkfAC3rVymEahM", 
            authDomain: "queuesystem-80e06.firebaseapp.com", 
            projectId: "queuesystem-80e06", 
            storageBucket: "queuesystem-80e06.firebasestorage.app", 
            messagingSenderId: "30275507505", 
            appId: "1:30275507505:web:d00cc742ed42bb6f370c10" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let isCounterClosed = false;
        let myTokenNumber = null;

        db.collection('meta').doc('adminStatus').onSnapshot(doc => {
            if (doc.exists) {
                const status = doc.data().status;
                const badge = document.getElementById('closedBadge');
                const btn = document.getElementById('mainBtn');
                const card = document.querySelector('.premium-card');
                const inputs = document.querySelectorAll('.input-field');

                if (status === 'CLOSED' || status === 'COUNTER CLOSED') {
                    isCounterClosed = true;
                    badge.classList.remove('hidden');
                    card.style.borderColor = '#ef4444';
                    btn.innerHTML = `<i class="fas fa-door-closed mr-2"></i> COUNTER CLOSED`;
                    btn.style.background = '#1a1a1a';
                    btn.style.color = '#ef4444';
                    inputs.forEach(i => { i.disabled = true; i.style.opacity = '0.3'; });
                } else {
                    isCounterClosed = false;
                    badge.classList.add('hidden');
                    card.style.borderColor = '#333';
                    btn.innerHTML = `GET DIGITAL TOKEN <i class="fas fa-ticket-alt"></i>`;
                    btn.style.background = '#ff6b00';
                    btn.style.color = 'black';
                    inputs.forEach(i => { i.disabled = false; i.style.opacity = '1'; });
                }
            }
        });

        db.collection('meta').doc('announcement').onSnapshot(doc => {
            if (doc.exists) document.querySelector('.notice-banner p').innerText = doc.data().message;
        });

        async function register() {
            if (isCounterClosed) {
                alert("⚠️ Counter is CLOSED. Please visit tomorrow.");
                return;
            }
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            if (!name || !phone) return alert("Fill details!");

            try {
                const snap = await db.collection('queue').get();
                const token = 101 + snap.size;
                await db.collection('queue').add({
                    token: token, name: name, phone: phone, purpose: document.getElementById('purpose').value,
                    status: 'waiting', timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                myTokenNumber = token;
                document.getElementById('regForm').classList.add('hidden');
                document.getElementById('statusView').classList.remove('hidden');
                document.getElementById('myToken').innerText = token;
                trackQueue();
            } catch (e) { alert("Error!"); }
        }

        function trackQueue() {
            db.collection('queue').where('status', '==', 'waiting').orderBy('timestamp', 'asc').onSnapshot(snap => {
                let list = []; snap.forEach(doc => list.push(doc.data().token));
                const pos = list.indexOf(myTokenNumber) + 1;
                if (pos > 0) document.getElementById('positionText').innerText = `You are #${pos} in line`;
            });
            db.collection('meta').doc('currentServing').onSnapshot(doc => {
                if (doc.exists && doc.data().token == myTokenNumber) {
                    document.getElementById('positionText').innerText = "IT'S YOUR TURN!";
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance("Token number " + myTokenNumber + " your turn."));
                }
            });
        }
    </script>
</body>
</html>

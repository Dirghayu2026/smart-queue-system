<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Smart Queue</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
        .glass-card { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 107, 0, 0.3); border-radius: 20px; }
        .input-style { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 107, 0, 0.2); border-radius: 10px; padding: 14px; width: 100%; color: white; outline: none; }
        .input-style:focus { border-color: #ff6b00; }
        .token-circle { width: 140px; height: 140px; border: 5px solid #ff6b00; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; color: #ff6b00; margin: 20px auto; box-shadow: 0 0 20px rgba(255, 107, 0, 0.2); }
        /* 🚀 NEW: Notice Animation */
        .notice-banner { background: rgba(255, 107, 0, 0.1); border: 1px solid #ff6b00; color: #ff6b00; padding: 10px; border-radius: 10px; margin-bottom: 20px; display: none; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-card p-8 w-full max-w-md shadow-2xl">
        
        <!-- 📢 LIVE BROADCAST NOTICE -->
        <div id="noticeBanner" class="notice-banner text-center text-sm font-bold">
            ⚠️ <span id="noticeText">Loading notices...</span>
        </div>

        <div id="regForm">
            <h2 class="text-3xl font-bold text-orange-500 mb-2 text-center uppercase tracking-tight">Join Queue</h2>
            <p class="text-zinc-500 text-sm text-center mb-6 italic">Enter details to get your token</p>

            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-orange-500 uppercase ml-1">Full Name</label>
                    <input type="text" id="name" placeholder="Rahul Patil" class="input-style mt-1">
                </div>
                <div>
                    <label class="text-xs font-bold text-orange-500 uppercase ml-1">Phone Number</label>
                    <input type="tel" id="phone" placeholder="7046008173" class="input-style mt-1">
                </div>
                <div>
                    <label class="text-xs font-bold text-orange-500 uppercase ml-1">Purpose</label>
                    <select id="purpose" class="input-style mt-1 text-zinc-400">
                        <option value="Enquiry">General Enquiry</option>
                        <option value="Fees Payment">Fees Payment</option>
                        <option value="Documents">Document Submission</option>
                    </select>
                </div>
                <button onclick="register()" id="regBtn" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-4 rounded-xl shadow-lg uppercase mt-4 transition-all active:scale-95">
                    Get Token →
                </button>
            </div>
        </div>

        <div id="statusView" class="hidden text-center">
            <h2 class="text-lg font-bold text-orange-500 uppercase">Your Token</h2>
            <div id="myToken" class="token-circle">--</div>
            
            <div class="space-y-4 mt-4">
                <div class="bg-black/30 p-4 rounded-xl border border-zinc-800">
                    <p class="text-zinc-500 text-xs uppercase font-bold mb-1">Queue Position</p>
                    <p id="positionText" class="text-xl font-bold text-green-400">Loading...</p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-black/30 p-3 rounded-xl border border-zinc-800">
                        <p class="text-zinc-500 text-[10px] uppercase font-bold">Now Serving</p>
                        <p id="nowServing" class="text-md font-bold text-orange-500">—</p>
                    </div>
                    <div class="bg-black/30 p-3 rounded-xl border border-zinc-800">
                        <p class="text-zinc-500 text-[10px] uppercase font-bold">Est. Wait</p>
                        <p id="estWait" class="text-md font-bold text-orange-500">0 min</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCFNZB5SBj2QoBJ6qF_pTkfAC3rVymEahM",
            authDomain: "queuesystem-80e06.firebaseapp.com",
            projectId: "queuesystem-80e06",
            storageBucket: "queuesystem-80e06.firebasestorage.app",
            messagingSenderId: "30275507505",
            appId: "1:30275507505:web:d00cc742ed42bb6f370c10"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let myTokenNumber = null;
        let hasAnnounced = false; // टाळण्यासाठी की एकदाच अनाउन्समेंट व्हावी

        // 🚀 LIVE BROADCAST LISTENER (ॲडमिनची नोटीस दाखवण्यासाठी)
        db.collection('meta').doc('announcement').onSnapshot(doc => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('noticeBanner').style.display = 'block';
                document.getElementById('noticeText').innerText = data.message;
            }
        });

        async function register() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const purpose = document.getElementById('purpose').value;
            const btn = document.getElementById('regBtn');

            if (!name || !phone) return alert("Fill all details!");
            btn.disabled = true;

            try {
                const snapshot = await db.collection('logs').where('action', '==', 'JOINED').get();
                const token = 101 + snapshot.size;

                await db.collection('queue').add({
                    token: token, name: name, phone: phone, purpose: purpose,
                    status: 'waiting', timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                await db.collection('logs').add({
                    time: new Date().toLocaleTimeString(), action: 'JOINED',
                    detail: `${token} - ${name}`, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                myTokenNumber = token;
                document.getElementById('regForm').classList.add('hidden');
                document.getElementById('statusView').classList.remove('hidden');
                document.getElementById('myToken').innerText = "#" + token;

                startLiveTracking();
            } catch (e) { alert("Error!"); btn.disabled = false; }
        }

        function startLiveTracking() {
            // १. क्यु पोझिशन
            db.collection('queue').where('status', '==', 'waiting').orderBy('timestamp', 'asc').onSnapshot(snapshot => {
                let queue = [];
                snapshot.forEach(doc => queue.push(doc.data().token));
                const pos = queue.indexOf(myTokenNumber) + 1;
                if (pos > 0) {
                    document.getElementById('positionText').innerText = `Position #${pos}`;
                    document.getElementById('estWait').innerText = `${pos * 5} min`;
                }
            });

            // २. सर्व्हिंग स्टेटस + व्हॉईस कॉल सिंक
            db.collection('meta').doc('currentServing').onSnapshot(doc => {
                const now = doc.exists ? doc.data().token : null;
                document.getElementById('nowServing').innerText = now ? "#" + now : "—";
                
                if (now && now == myTokenNumber) {
                    document.getElementById('positionText').innerText = "IT'S YOUR TURN! GO NOW 🏃";
                    document.getElementById('positionText').className = "text-xl font-bold text-orange-500 animate-bounce";
                    
                    // 🔊 USER SIDE AUTO-VOICE (कॉल आल्यावर विद्यार्थ्याच्या फोनवर आवाज येईल)
                    if (!hasAnnounced) {
                        const speech = new SpeechSynthesisUtterance("Attention please! It is your turn. Please proceed to the counter immediately.");
                        window.speechSynthesis.speak(speech);
                        hasAnnounced = true; // एकदाच बोलण्यासाठी
                    }
                } else {
                    hasAnnounced = false; // पुढच्या वेळी पुन्हा कॉल आल्यास बोलण्यासाठी
                }
            });
        }
    </script>
</body>
</html>
